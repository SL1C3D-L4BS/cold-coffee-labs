name: steam-deck-nightly

# Steam Deck Verified nightly probe — Part C §22 scaffold (ADR-0113).
# Runs sandbox_deck_probe under steamrt-sniper to check the Valve 2026
# Deck Verified checklist (no launcher, controller glyphs, default bindings,
# no compat warnings, native Linux Vulkan).

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: steam-deck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deck-probe:
    name: deck-probe (steamrt-sniper)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
      options: --user 0:0

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Setup Ninja
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y ninja-build cmake

      - name: Install Vulkan SDK (runtime only)
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.341.1
          cache: true

      - name: Configure dev-linux
        run: cmake --preset dev-linux

      - name: Build sandbox_deck_probe
        run: cmake --build --preset dev-linux --target sandbox_deck_probe

      - name: Run Deck checklist probe
        run: ./build/dev-linux/bin/sandbox_deck_probe

      - name: Run sandbox_director headless smoke
        run: cmake --build --preset dev-linux --target sandbox_director && ./build/dev-linux/bin/sandbox_director --headless
        continue-on-error: true
