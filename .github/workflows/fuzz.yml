name: fuzz-nightly

# LibFuzzer harnesses — Part C §25 scaffold (ADR-0117).
# 30-minute budget per harness; crashes upload corpora + trigger issues.

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: ${{ matrix.harness }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        harness:
          - fuzz_gwscene
          - fuzz_bld_ipc
          - fuzz_mod_manifest
          - fuzz_replay
          - fuzz_dialogue_graph

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Clang 18
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.341.1
          cache: true

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure fuzz preset
        run: cmake --preset fuzz-linux -DGW_FUZZ=ON

      - name: Build harness
        run: cmake --build --preset fuzz-linux --target ${{ matrix.harness }}

      - name: Run for 30 minutes
        run: |
          mkdir -p corpus
          ./build/fuzz-linux/bin/fuzz/${{ matrix.harness }} \
            -max_total_time=1800 \
            -print_final_stats=1 \
            -artifact_prefix=crash- \
            tests/fuzz/corpus/${{ matrix.harness }}/ \
            corpus/

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.harness }}-crash
          path: crash-*
