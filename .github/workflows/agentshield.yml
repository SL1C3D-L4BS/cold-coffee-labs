# .github/workflows/agentshield.yml — optional policy gate for PRs.
# Policy file: `.github/agentshield.json`. Runtime: `tools/ai/agentshield_cli.js`.

name: AgentShield

on:
  pull_request:
    branches: [main, "pivot/*"]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentshield:
    name: AgentShield policy gate (hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify AgentShield config present
        run: |
          test -f .github/agentshield.json || {
            echo "::error title=AgentShield::Missing .github/agentshield.json."
            exit 1
          }
          cat .github/agentshield.json

      - name: Run AgentShield (hard-fail)
        run: |
          node tools/ai/agentshield_cli.js \
            --config .github/agentshield.json \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --fail-on critical
