# .github/workflows/agentshield.yml
# ADR-0119 + ADR-0120: AgentShield CI gate for Greywater / Sacrilege.
#
# Blocks PRs that:
#   1. Modify paths under `blocked_paths` in `.cursor/agentshield.json`
#      without an accompanying ADR-dddd reference in the commit range
#      (or a `Waiver: <planning-doc>` trailer).
#   2. Touch docs in `require_adr_reference_for` without an ADR-dddd
#      reference in the commit range.
#   3. Exceed per-PR volume caps (`max_files_per_session`,
#      `max_lines_per_session`).
#   4. Lack the `Agent-Session: <id>` commit trailer on any commit in
#      the range (`enforce_commit_trailer: true`).
#
# The policy runtime lives in `tools/ai/agentshield_cli.js`. It is a
# self-contained Node implementation because ECC v1.10.0 upstream does
# not yet ship an `agentshield` package (verified 2026-04-23); when
# upstream adds one we point this workflow at
# `third_party/everything-claude-code/packages/agentshield/bin/cli.js`.

name: AgentShield

on:
  pull_request:
    branches: [main, "pivot/*"]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentshield:
    name: AgentShield policy gate (hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify AgentShield config present
        run: |
          test -f .cursor/agentshield.json || {
            echo "::error title=AgentShield::Missing .cursor/agentshield.json (ADR-0120)."
            exit 1
          }
          cat .cursor/agentshield.json

      - name: Run AgentShield (hard-fail)
        run: |
          CLI_UPSTREAM=third_party/everything-claude-code/packages/agentshield/bin/cli.js
          if [ -f "$CLI_UPSTREAM" ]; then
            echo "Using upstream ECC AgentShield CLI."
            CLI="$CLI_UPSTREAM"
          else
            echo "Upstream ECC v1.10.0 does not ship agentshield; using tools/ai/agentshield_cli.js."
            CLI=tools/ai/agentshield_cli.js
          fi
          node "$CLI" \
            --config .cursor/agentshield.json \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --fail-on critical
