# ---------------------------------------------------------------------------
# AI tooling — graphify + everything-claude-code (full install).
# ---------------------------------------------------------------------------

  - id: ai-graphify-install
    kind: ai-tooling
    tier: A
    title: "Install graphify via pipx + Cursor rule"
    depends_on: []
    inputs: []
    writes:
      - tools/ai/requirements.txt
      - tools/ai/README.md
      - .cursor/rules/graphify.mdc
      - .graphifyignore
    exit_criteria:
      - "pipx list shows graphifyy at pinned version"
      - ".cursor/rules/graphify.mdc exists"
    prompt: |
      Install graphifyy via pipx from PyPI; pin version in
      tools/ai/requirements.txt. Run `graphify cursor install` to drop the
      Cursor rule. Add a .graphifyignore excluding build/, third_party/,
      target/, docs/translations/.

  - id: ai-graphify-build
    kind: ai-tooling
    tier: A
    depends_on: [ai-graphify-install]
    title: "Run initial graphify build and commit graph.json"
    inputs: []
    writes:
      - graphify-out/GRAPH_REPORT.md
      - graphify-out/graph.json
      - .gitignore
    exit_criteria:
      - "graphify-out/GRAPH_REPORT.md non-empty"
    prompt: |
      Run `graphify .`. Commit `graphify-out/GRAPH_REPORT.md` and
      `graphify-out/graph.json`. Add cache/, manifest.json, cost.json to
      .gitignore.

  - id: ai-graphify-mcp
    kind: ai-tooling
    tier: A
    depends_on: [ai-graphify-build]
    title: "Register graphify MCP in .cursor/mcp.json"
    inputs: []
    writes:
      - .cursor/mcp.json
    exit_criteria:
      - ".cursor/mcp.json contains a graphify server entry Opus can dispatch"
    prompt: |
      Add a project-local MCP server definition running
      `python -m graphify.serve graphify-out/graph.json` so Claude Opus
      can call query_graph / get_neighbors / shortest_path.

  - id: ai-graphify-hook
    kind: ai-tooling
    tier: B
    depends_on: [ai-graphify-build]
    title: "Install graphify post-commit + post-checkout hooks"
    inputs: []
    writes:
      - .git/hooks/post-commit
      - .git/hooks/post-checkout
    exit_criteria:
      - "Hook runs without interfering with cpm-cache / ninja git state"
    prompt: |
      Run `graphify hook install`. Verify no conflict with existing hooks;
      adjust adapter chaining if needed.

  - id: ai-graphify-adr
    kind: ai-tooling
    tier: A
    depends_on: [ai-graphify-install]
    title: "ADR-0118: graphify adoption"
    inputs: []
    writes:
      - docs/10_APPENDIX_ADRS_AND_REFERENCES.md
      - CLAUDE.md
    exit_criteria:
      - "ADR-0118 explains the decision; CLAUDE.md points every agent at GRAPH_REPORT.md first"
    prompt: |
      Append ADR-0118 (AI Knowledge Graph — graphify adoption) to
      docs/10. Add a pointer in CLAUDE.md so every agent reads
      graphify-out/GRAPH_REPORT.md before grepping.

  - id: ai-ecc-vendor-full
    kind: ai-tooling
    tier: A
    title: "Vendor everything-claude-code at pinned SHA"
    depends_on: []
    inputs: []
    writes:
      - third_party/_vendor/everything-claude-code/
    exit_criteria:
      - "Full ECC upstream surface present at pinned commit"
    prompt: |
      git clone https://github.com/affaan-m/everything-claude-code.git
      into third_party/_vendor/. Pin to latest tagged release. Vendor
      full surface: all agents, skills, commands, rules, hooks, MCP
      configs, plugin manifests.

  - id: ai-ecc-install-global
    kind: ai-tooling
    tier: A
    depends_on: [ai-ecc-vendor-full]
    title: "Install ECC globally + project-scoped adapters"
    inputs: []
    writes:
      - tools/ai/install_ecc.ps1
      - tools/ai/install_ecc.sh
      - tools/ai/uninstall_ecc.ps1
      - tools/ai/uninstall_ecc.sh
      - .cursor/hooks/adapter.js
    exit_criteria:
      - "install_ecc --profile full places agents/commands/skills/hooks under ~/.claude and .cursor/"
    prompt: |
      Author install/uninstall scripts (PowerShell + bash). Profile=full
      copies the full upstream surface into ~/.claude and mirrors
      Cursor-compatible assets into `.cursor/`.

  - id: ai-ecc-all-rules
    kind: ai-tooling
    tier: A
    depends_on: [ai-ecc-install-global]
    title: "Copy all ECC language rule packs"
