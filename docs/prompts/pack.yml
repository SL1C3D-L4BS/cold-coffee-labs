# docs/prompts/pack.yml — Greywater Engine full-stack prompt pack.
#
# Schema (v1):
#   schema_version: 1
#   render_target: docs/prompts           # where rendered markdown lives
#   tasks:
#     - id:           stable-slug              # required, unique
#       kind:         preflight|phase-week|ai-tooling|ci|docs
#       phase:        <int|null>
#       week:         <int|null>
#       tier:         A|B|null                 # A = ship-bar, B = soft
#       title:        Short human-readable title
#       depends_on:   [<id>, ...]              # must exist in pack
#       inputs:       [paths]                  # read-mostly files
#       writes:       [paths]                  # files the agent creates/edits
#       exit_criteria:
#         - Each entry is a verifiable outcome (CI green, test passes, etc.)
#       prompt: |
#         Multi-line agent-ready prompt, self-contained. Cites ADRs + docs.
#
# Rendering: tools/prompts/render_pack.py reads this and writes one markdown
# file per task under docs/prompts/<bucket>/<slug>.md. CI lint
# (tools/lint/check_prompt_pack.py) asserts the render is up-to-date.

schema_version: 1
render_target: docs/prompts

tasks:

# ---------------------------------------------------------------------------
# Preflight — 24 wire-up fixes from docs/prompts/00_WIRE_UP_AUDIT.md.
# ---------------------------------------------------------------------------

  - id: pre-ed-theme-menu
    kind: preflight
    phase: null
    week: null
    tier: A
    title: "Theme registry boot + View → Theme menu"
    depends_on: []
    inputs:
      - editor/theme/theme_registry.hpp
      - editor/app/editor_app.cpp
    writes:
      - editor/app/editor_app.cpp
    exit_criteria:
      - "Editor startup calls ThemeRegistry::instance().set_active(persisted_id) before apply_theme()"
      - "View → Theme submenu swaps theme live; ImGui re-colour verified by a doctest"
      - "CI green dev-win + dev-linux"
    prompt: |
      Wire the editor theme system from docs/prompts/00_WIRE_UP_AUDIT.md
      entry `pre-ed-theme-menu`.

      1. Load `ThemeId` from the editor TOML config (see `editor/app/editor_app.cpp` apply_theme() site).
      2. Call `gw::editor::theme::ThemeRegistry::instance().set_active(id)` before apply_theme().
      3. Add a `View → Theme` submenu in the editor main-menu builder with
         Brewed Slate, Corrupted Relic, Field Test HC radio items. On click
         call `set_active()` and re-run `apply_theme()`.
      4. Write a doctest asserting that after `set_active(CorruptedRelic)`
         `ImGui::GetStyle().Colors[ImGuiCol_WindowBg]` changes.

      Follow ADR-0104 (three-profile theme). Do not break the persisted
      layout ini.

