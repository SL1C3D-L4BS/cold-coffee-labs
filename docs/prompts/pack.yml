      Wire editor accessibility config per ADR-0117.
      - Own an `EditorA11yConfig` member on EditorApplication.
      - Call `gw::editor::a11y::apply(cfg)` after `apply_theme()`.
      - Add `Window → Accessibility…` main-menu entry opening a modal
